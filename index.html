<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
    overflow-x:hidden;
}

/* blueprint overlay */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        repeating-linear-gradient(
            0deg,
            rgba(0,255,255,0.05) 0px,
            rgba(0,255,255,0.05) 1px,
            transparent 1px,
            transparent 40px
        ),
        repeating-linear-gradient(
            90deg,
            rgba(0,255,255,0.05) 0px,
            rgba(0,255,255,0.05) 1px,
            transparent 1px,
            transparent 40px
        );
    pointer-events:none;
}

/* NAVBAR */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(8px);
    background:rgba(10,20,40,0.6);
    border-bottom:1px solid rgba(0,255,255,0.3);
}

nav .logos{
    display:flex;
    align-items:center;
    gap:20px;
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:30px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
    letter-spacing:1px;
    transition:0.3s;
}

nav a:hover{
    color:#00f0ff;
    text-shadow:0 0 10px #00f0ff;
}

/* HERO */

.hero{
    text-align:center;
    padding:120px 20px;
}

.hero h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    text-shadow:
        0 0 10px #00f0ff,
        0 0 30px #8a2be2;
}

.hero p{
    font-size:22px;
    opacity:0.85;
}

.button{
    display:inline-block;
    margin-top:40px;
    padding:16px 50px;
    border-radius:40px;
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
    font-weight:bold;
    text-decoration:none;
    transition:0.3s;
}

.button:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #8a2be2;
}

footer{
    text-align:center;
    padding:40px;
    opacity:0.6;
}

</style>
</head>
<body>

<nav>
    <div class="logos">
        <img src="assets/draft-logo.png">
        <img src="assets/msp-logo.png">
    </div>

    <ul>
        <li><a href="#">Aktualny Draft</a></li>
        <li><a href="#">Historia</a></li>
        <li><a href="#">Statystyki</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>MSP SnapDraft Event</h1>
    <p>Oficjalna Liga Draftowa Marvel Snap Polska</p>
    <a class="button" href="#">Zobacz Aktualny Draft</a>
</div>

<footer>
    © 2026 MSP SnapDraft Event
</footer>

</body>
</html>
