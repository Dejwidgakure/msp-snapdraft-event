<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft Event</title>

    <style>

        body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("assets/cosmic_tlo.png") center no-repeat;
  background-size: 80%;
  z-index: 1;
  animation: floatGalaxy 18s ease-in-out infinite alternate;
  pointer-events: none;
  opacity: 0.85;
}

@keyframes floatGalaxy {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-30px); }
}

/* GUI nad grafiką */
nav,
.hero {
  position: relative;
  z-index: 2;
}

</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
    overflow-x:hidden;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* HERO */
.hero{
    position:relative;
    text-align:center;
    padding:100px 20px 80px 20px;
}

/* Cosmic overlay graphic */
.hero-bg{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    max-width:1400px;
    opacity:0.35;
    pointer-events:none;
    z-index:0;
}

/* Logo */
.hero-logo{
    position:relative;
    z-index:2;
    height:260px;
    filter:drop-shadow(0 0 60px #00f0ff);
    margin-bottom:40px;
}

/* Big Title */
.hero-title{
    position:relative;
    z-index:2;
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    text-align:center;
    text-shadow:
        0 0 20px #00f0ff,
        0 0 40px #8a2be2,
        0 0 80px #00f0ff;
    margin-bottom:60px;
}

/* Buttons */
.buttons{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.buttons a{
    padding:18px 40px;
    border-radius:15px;
    font-weight:bold;
    text-decoration:none;
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
    box-shadow:0 0 25px #00f0ff;
    transition:0.3s;
}

.buttons a:hover{
    transform:scale(1.05);
    box-shadow:0 0 50px #8a2be2;
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="draft.html">Wszystkie drafty</a></li>
        <li><a href="hallOfFame.html">Sala Chwały</a></li>
    </ul>
</nav>

<div class="hero">

    <!-- Półprzezroczysta grafika -->
    <img src="assets/hero-draft.png" class="hero-bg">

    <!-- Duże logo eventu -->
    <img src="assets/draft-logo.png" class="hero-logo">

    <!-- Wielki napis -->
    <div class="hero-title">
        Oficjalna Strona Eventów Draftowych MSP
    </div>

    <div class="buttons">
        <a href="draft.html">Zobacz aktualny draft</a>
        <a href="draft.html">Wszystkie drafty</a>
        <a href="hallOfFame.html">Sala Chwały</a>
    </div>

</div>

</body>
</html>
