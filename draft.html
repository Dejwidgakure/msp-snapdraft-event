<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* --- STYLES NIE RUSZANE --- */
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}
nav img{ height:60px; filter:drop-shadow(0 0 15px #00f0ff); }
nav ul{ list-style:none; display:flex; gap:40px; }
nav a{ text-decoration:none; color:white; font-weight:600; }

.header{ text-align:center; padding:60px 20px 20px 20px; }
.header img{
    height:180px;
    display:block;
    margin:0 auto 20px;
    filter:drop-shadow(0 0 40px #00f0ff);
}
.header h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin:0;
    text-shadow:0 0 20px #00f0ff,0 0 40px #8a2be2;
}
.meta{ margin-top:15px; opacity:0.8; }

.draft-navigation{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:30px 0;
}
.draft-navigation button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    font-weight:bold;
    cursor:pointer;
}

/* PODIUM */
.podium-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin:40px 0 20px 0;
}
.podium{
    width:160px;
    text-align:center;
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(10px);
    background:rgba(0,0,40,0.7);
    transition:0.3s;
}
.podium:hover{ transform:translateY(-6px); }
.podium h3{ margin:10px 0 5px 0; }
.first{ height:200px; }
.second{ height:160px; }
.third{ height:140px; }

/* MAIN */
.main-row{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:40px;
    align-items:flex-start;
}
.panel{
    background:rgba(0,0,40,0.75);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,240,255,0.3);
}
.panel h2{
    font-family:'Orbitron', sans-serif;
    margin-top:0;
    text-align:center;
}
table{
    border-collapse:collapse;
    min-width:700px;
}
th, td{
    padding:12px 18px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}
th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}
.results{
    max-height:420px;
    overflow-y:auto;
    width:280px;
}

/* DRAFT STATS */
.draft-stats{ margin:60px auto; max-width:1100px; }
.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}
.stat-box{
    padding:20px;
    border-radius:18px;
    background:rgba(0,0,50,0.7);
    box-shadow:0 0 25px rgba(0,240,255,0.4);
}

/* DECKI */
.decks-section{ padding:60px; }
.decks-section h2{
    text-align:center;
    font-size:48px;
    font-family:'Orbitron', sans-serif;
    margin-bottom:60px;
}
.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}
.deck-card{
    padding:30px;
    border-radius:20px;
    background:rgba(0,0,30,0.8);
}
.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:20px;
}
.card-tile{
    padding:6px;
    font-size:13px;
    border-radius:8px;
    text-align:center;
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
</nav>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1 id="draftTitle"></h1>
    <div class="meta" id="draftMeta"></div>
</div>

<div class="draft-navigation">
    <button id="prevDraft">⬅ Poprzedni</button>
    <button id="nextDraft">Następny ➡</button>
</div>

<div class="podium-wrapper" id="podium"></div>

<div class="main-row">
    <div class="panel">
        <h2>AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Pkt</th>
                    <th>Wygr.</th>
                    <th>Przegr.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel results" id="resultsBox">
        <h2>WYNIKI</h2>
    </div>
</div>

<div class="draft-stats">
    <h2 style="text-align:center;font-family:'Orbitron';">STATYSTYKI DRAFTU</h2>
    <div class="stats-grid" id="statsGrid"></div>
</div>

<div class="decks-section">
    <h2>DECKI GRACZY</h2>
    <div class="decks-grid" id="decksContainer"></div>
</div>

<script src="database.js"></script>
<script>

/* ===== LOAD ===== */

const urlParams=new URLSearchParams(window.location.search);
const idParam=parseInt(urlParams.get("id"));
let draft=idParam?database.drafts.find(d=>d.id===idParam)
                :database.drafts.sort((a,b)=>b.id-a.id)[0];

document.getElementById("draftTitle").textContent="DRAFT "+draft.id;
document.getElementById("draftMeta").textContent=draft.mode;

/* ===== COLORS ===== */

const playerColors=[
"#00f0ff","#ff00ff","#00ff88","#ffd700",
"#ff4d4d","#7d5cff","#00ffcc","#ff8800",
"#ffffff","#66ccff","#ff66cc","#aaff00"
];

/* ===== STATS ===== */

let stats={};
let cleanWins={};
let lossPoints={};

draft.players.forEach((p,i)=>{
stats[p.name]={wins:0,losses:0,total:0,color:playerColors[i%playerColors.length]};
cleanWins[p.name]=0;
lossPoints[p.name]=0;
});

draft.matches.forEach(m=>{
if(m.pts1>m.pts2){
stats[m.p1].wins++; stats[m.p2].losses++;
if(m.pts2===0) cleanWins[m.p1]++;
lossPoints[m.p2]+=m.pts2;
}else{
stats[m.p2].wins++; stats[m.p1].losses++;
if(m.pts1===0) cleanWins[m.p2]++;
lossPoints[m.p1]+=m.pts1;
}
stats[m.p1].total+=m.pts1;
stats[m.p2].total+=m.pts2;
document.getElementById("resultsBox")
.innerHTML+=`<p>${m.p1} ${m.pts1} – ${m.pts2} ${m.p2}</p>`;
});

/* ===== RANKING ===== */

let ranking=Object.keys(stats).map(n=>({name:n,...stats[n]}));
ranking.sort((a,b)=>b.total-a.total);

ranking.forEach((p,i)=>{
document.querySelector("#rankingTable tbody").innerHTML+=`
<tr>
<td>${i+1}</td>
<td style="color:${p.color}">${p.name}</td>
<td>${p.wins}-${p.losses}</td>
<td>${p.total}</td>
<td>${p.wins}</td>
<td>${p.losses}</td>
</tr>`;
});

/* ===== PODIUM ===== */

const medals=["🥇","🥈","🥉"];
const classes=["first","second","third"];
ranking.slice(0,3).forEach((p,i)=>{
document.getElementById("podium").innerHTML+=`
<div class="podium ${classes[i]}" style="border:2px solid ${p.color};box-shadow:0 0 25px ${p.color}">
<div style="font-size:28px">${medals[i]}</div>
<h3 style="color:${p.color}">${p.name}</h3>
<div>${p.total} pkt</div>
</div>`;
});

/* ===== CARD COUNT ===== */

let cardCount={};
draft.players.forEach(p=>{
p.deck.forEach(c=>cardCount[c]=(cardCount[c]||0)+1);
});
let maxPick=Math.max(...Object.values(cardCount));
let mostPicked=Object.keys(cardCount)
.filter(c=>cardCount[c]===maxPick)
.sort()
.slice(0,5);

/* ===== CLEAN WINS ===== */

let maxClean=Math.max(...Object.values(cleanWins));
let cleanLeaders=Object.keys(cleanWins)
.filter(n=>cleanWins[n]===maxClean)
.sort()
.slice(0,5);

/* ===== LOSS POINTS ===== */

let maxLoss=Math.max(...Object.values(lossPoints));
let lossLeaders=Object.keys(lossPoints)
.filter(n=>lossPoints[n]===maxLoss)
.sort()
.slice(0,5);

/* ===== STAT BOXES ===== */

function addStat(t,v){
document.getElementById("statsGrid").innerHTML+=
`<div class="stat-box"><strong>${t}</strong><div style="margin-top:10px">${v}</div></div>`;
}

addStat("🏆 Najwięcej zwycięstw",
ranking[0].name+" ("+ranking[0].wins+")");

addStat("🧨 Największy stomp","-");
addStat("🧊 Najbardziej zacięty mecz","-");

addStat("⚔ Najwięcej wygranych do 0",
cleanLeaders.join(", ")+" ("+maxClean+")");

addStat("💀 Najwięcej pkt z porażek",
lossLeaders.join(", ")+" ("+maxLoss+")");

addStat("🃏 Najczęściej wybierana karta",
mostPicked.join(", ")+" ("+maxPick+")");

/* ===== DECKS + OBRAZKI ===== */

draft.players.forEach((p,i)=>{
const color=playerColors[i%playerColors.length];
const clean=p.name.toLowerCase().replace(/[^a-z0-9]/g,"");
let html=`
<div class="deck-card" style="border:2px solid ${color};box-shadow:0 0 30px ${color}">
<h3 style="color:${color};text-align:center;">${p.name}</h3>
<div class="cards-grid">
${p.deck.map(c=>`<div class="card-tile" style="color:${color};border:1px solid ${color};">${c}</div>`).join("")}
</div>
<img src="assets/decks/${clean}_${draft.id}.jpg" style="width:60%;margin-top:20px;border-radius:15px;">
</div>`;
document.getElementById("decksContainer").innerHTML+=html;
});

</script>
</body>
</html>
