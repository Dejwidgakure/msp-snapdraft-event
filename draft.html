<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

    .winner-bg{
    position:absolute;
    top:260px;
    left:50%;
    transform:translateX(-50%);
    width:1100px;
    height:650px;

    opacity:0.30;
    filter:blur(3px);

    z-index:0;

    border-radius: 50% / 35%;


    animation: deckFloat 18s ease-in-out infinite alternate;

    background-position:center;
    background-size:cover;
    background-repeat:no-repeat;
}

@keyframes deckFloat{
    0%{ transform:translateX(-50%) translateY(0px); }
    100%{ transform:translateX(-50%) translateY(-35px); }
}

    @keyframes gradientMove{
0%{
background-position:0% 50%;
}
100%{
background-position:200% 50%;
}
}

    @keyframes galaxyMove{
0%{ background-position:0% 0%; }
100%{ background-position:100% 100%; }
}
/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}
nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}
nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}
nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* TOP NAV BUTTONS – FIX */
.top-draft-nav{
    position:relative;
    height:0;
}
.top-draft-nav button{
    position:absolute;
    top:10px;
    padding:10px 18px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    font-weight:bold;
    cursor:pointer;
    z-index:100;
    box-shadow:0 0 15px #00f0ff;
}
#prevDraft{ left:20px; }
#nextDraft{ right:20px; }

/* HEADER */
.header{
    position:relative;
    isolation: isolate;
    z-index:2;
    text-align:center;
    padding:30px 20px 10px 20px;

    background: linear-gradient(
        to bottom,
        rgba(0,0,20,0.85),
        rgba(0,0,20,0.65),
        rgba(0,0,20,0)
    );

    backdrop-filter: blur(2px);
}
.header img{
    height:180px;
    display:block;
    margin:0 auto 20px;
    filter:drop-shadow(0 0 40px #00f0ff);
}
.header h1{

position:relative;
z-index:1;

font-family:'Orbitron', sans-serif;
font-size:72px;
font-weight:900;
margin:0;
letter-spacing:3px;

/* 🔥 gradient */
background: linear-gradient(
90deg,
#00f0ff,
#4b00ff,
#ff00ff,
#00f0ff
);

background-size:200%;
animation:gradientMove 6s linear infinite;

/* 🔥 KLUCZ */
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

/* 🔥 outline żeby było czytelne */
-webkit-text-stroke:1px rgba(255,255,255,0.35);

/* 🔥 glow */
text-shadow:
0 0 4px #ffffff,
0 0 10px #00f0ff,
0 0 18px #00f0ff,
0 0 22px #8a2be2;

}

.header h1::before{

content: attr(data-text);

position:absolute;
left:0;
top:0;
width:100%;

background:url("assets/galaxytool.png");
background-size:cover;
background-position:center;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

opacity:0.8;

z-index:0;

pointer-events:none;

animation:galaxyMove 20s linear infinite;

}

/* PURPLE HEADER GLOW */
.section-title{
    text-align:center;
    font-family:'Orbitron';
    text-shadow:0 0 15px #8a2be2,0 0 30px #8a2be2;
}

/* PODIUM */
.podium-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin:40px 0 20px 0;
}
.podium{
    width:160px;
    text-align:center;
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(10px);
    background:rgba(0,0,40,0.7);
    transition:0.3s;
}
.podium:hover{ transform:translateY(-6px); }
.first{ height:200px; }
.second{ height:160px; }
.third{ height:140px; }

/* MAIN */
.main-row{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:40px;
    align-items:flex-start;
}
.panel{
    background:rgba(0,0,40,0.75);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,240,255,0.3);
}
.panel h2{ margin-top:0; }

table{
    border-collapse:collapse;
    min-width:700px;
}
th, td{
    padding:12px 18px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}
th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}
.results{
    max-height:420px;
    overflow-y:auto;
    width:280px;
}

/* STATS – FIX */
/* ========================= */
/* ===== STATYSTYKI ======== */
/* ========================= */

.draft-stats{
margin:90px auto;
max-width:1100px;
padding:0 40px;
}

/* układ 3 + 2 */

.stats-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:35px;
max-width:1100px;
margin:40px auto 0 auto;
}

/* górny rząd */

.stats-grid .stat-box:nth-child(1){grid-column:1/3;}
.stats-grid .stat-box:nth-child(2){grid-column:3/5;}
.stats-grid .stat-box:nth-child(3){grid-column:5/7;}

/* dolny rząd */

.stats-grid .stat-box:nth-child(4){grid-column:2/4;}
.stats-grid .stat-box:nth-child(5){grid-column:4/6;}

/* kafelki */

.stat-box{

padding:22px;

border-radius:20px;

background:rgba(0,0,40,0.65);

backdrop-filter:blur(8px);

box-shadow:0 0 25px rgba(0,240,255,0.35);

border:1px solid rgba(0,255,255,0.25);

text-align:center;

font-size:18px;

line-height:1.6;

min-height:90px;

}

/* tytuł */

.stat-box strong{

display:block;

font-family:'Rajdhani', sans-serif;

font-size:20px;
font-weight:700;

margin-bottom:10px;

text-shadow:0 0 10px #8a2be2;

}
/* DECKS */
.decks-section{ padding:60px; }
.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}
.deck-card{
    padding:30px;
    border-radius:20px;
    background:rgba(0,0,30,0.8);
    position:relative;
}
.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:20px;
}
.card-tile{
    padding:6px;
    font-size:13px;
    border-radius:8px;
    text-align:center;
}

    /* JEFF ZOOM BUTTON */

.deck-zoom-btn{
position:absolute;
bottom:10px;
right:10px;

width:42px;
height:42px;

cursor:pointer;
z-index:5;
}

.deck-zoom-btn img{
width:100%;
transition:0.25s;

filter:
drop-shadow(0 0 6px #00f0ff)
drop-shadow(0 0 10px #8a2be2);
}

.deck-zoom-btn:hover img{

transform:scale(1.2) rotate(6deg);

filter:
drop-shadow(0 0 10px #00f0ff)
drop-shadow(0 0 25px #8a2be2)
drop-shadow(0 0 40px #8a2be2);

}

    /* ZOOM MODAL */

.deckZoomOverlay{

position:fixed;
inset:0;

background:rgba(0,0,40,0.9);

display:flex;
justify-content:center;
align-items:center;

z-index:9999;

}

.deckZoomModal img{

width:520px;

border-radius:18px;

box-shadow:
0 0 20px #00f0ff,
0 0 40px #00f0ff,
0 0 70px #8a2be2;

animation:neonPulse 1.2s infinite alternate;

}

@keyframes neonPulse{

0%{
box-shadow:
0 0 20px #00f0ff,
0 0 40px #00f0ff,
0 0 70px #8a2be2;
}

100%{
box-shadow:
0 0 30px #00f0ff,
0 0 60px #00f0ff,
0 0 120px #8a2be2;
}

}
    
.deck-card > img:first-of-type{

display:block;

width:260px;
height:170px;

object-fit:contain;

margin:20px auto 0 auto;

border-radius:12px;

box-shadow:0 0 15px rgba(0,240,255,0.6);

background:rgba(0,0,20,0.6);

padding:6px;

}

/* CREATOR PANEL */
.creator-panel{
    margin-top:80px;
    padding:30px 60px;
    background:rgba(5,10,25,0.75);
    backdrop-filter:blur(10px);
    border-top:2px solid #00f0ff;
}
.creator-panel h3{
    text-align:center;
    font-family:'Orbitron';
}
.creator-panel button{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00f0ff;
    font-weight:bold;
    cursor:pointer;
}
textarea{
    width:100%;
    height:150px;
    margin-top:20px;
}

  /* ===== NIEROZEGRANE MECZE ===== */

.unplayed-section{
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid rgba(0,255,255,0.3);
}

.unplayed-section h3{
    margin-bottom:10px;
    font-size:18px;
    text-align:center;
}

.unplayed-match{
    font-size:14px;
    opacity:0.85;
    padding:3px 0;
}

.main-row,
.draft-stats,
.decks-section{
    position:relative;
    z-index:2;
}
@keyframes rainbowPlus{

0%{ color:#00f0ff; text-shadow:0 0 10px #00f0ff;}
25%{ color:#ff00ff; text-shadow:0 0 10px #ff00ff;}
50%{ color:#8a2be2; text-shadow:0 0 10px #8a2be2;}
75%{ color:#00ff88; text-shadow:0 0 10px #00ff88;}
100%{ color:#00f0ff; text-shadow:0 0 10px #00f0ff;}

}

    .player-modal{
position:fixed;
top:80px;
left:80px;

width:380px;
max-height:75vh;
animation:modalAppear 0.35s ease;

background:
linear-gradient(rgba(0,0,30,0.75), rgba(0,0,50,0.8)),
url("assets/prompt-bg.png");

background-size:cover;

border-radius:20px;
box-shadow:
0 0 20px #00f0ff,
0 0 40px #8a2be2;

z-index:99999;

display:flex;
flex-direction:column;

overflow:hidden;
}

.hidden{
display:none;
}

    .player-modal::before{
content:"";
position:absolute;
inset:-3px;

border-radius:20px;

background:linear-gradient(
90deg,
transparent,
#00f0ff,
#8a2be2,
transparent
);

opacity:0;

filter:blur(8px);

animation:portalRing 0.8s ease forwards;

pointer-events:none;
}

@keyframes portalRing{
0%{
opacity:0;
transform:scale(0.6);
}
50%{
opacity:1;
transform:scale(1.1);
}
100%{
opacity:0;
transform:scale(1.2);
}
}

/* HEADER */
.player-modal-header{
display:flex;
justify-content:space-between;
align-items:center;

cursor:grab;

padding:12px 18px;

font-family:'Orbitron';
font-size:18px;

background:rgba(0,0,40,0.8);

border-bottom:1px solid rgba(0,255,255,0.3);
}

.player-modal-header:active{
cursor:grabbing;
}
padding:12px 18px;

font-family:'Orbitron';
font-size:18px;

background:rgba(0,0,40,0.8);

border-bottom:1px solid rgba(0,255,255,0.3);
}

/* CLOSE */
.close-btn{
cursor:pointer;
font-size:18px;
}

/* CONTENT */
.player-modal-content{
padding:15px;
overflow-y:auto;
flex:1;
}

/* INFO */
.player-info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:15px;
}

    .player-info div{
background:rgba(0,0,40,0.6);
padding:8px;
border-radius:10px;
text-align:center;

box-shadow:0 0 10px rgba(0,240,255,0.2);
}

.player-info b{
font-size:18px;
}

.player-info div{
text-align:center;
}

/* MATCHES */
.player-matches{
font-size:14px;
line-height:1.6;
}

/* FOOTER */
.player-modal-footer{
padding:12px;

background:rgba(0,0,40,0.9);

border-top:1px solid rgba(0,255,255,0.3);

position:sticky;
bottom:0;
}

.player-modal-footer button{
width:100%;
padding:10px;

border:none;
border-radius:10px;

font-weight:bold;
cursor:pointer;

background:#00f0ff;

box-shadow:
0 0 10px #00f0ff,
0 0 20px #8a2be2;

transition:0.2s;
}

    .player-modal-header span{
color:#00f0ff;

text-shadow:
0 0 6px #00f0ff,
0 0 12px #00f0ff,
0 0 20px #8a2be2;
}

    .player-name{
transition:0.25s;
}

.player-name:hover{
transform:scale(1.12);

text-shadow:
0 0 8px currentColor,
0 0 16px currentColor,
0 0 30px #8a2be2;

filter:brightness(1.4);
}

.player-modal-footer button:hover{
transform:scale(1.05);
}
.highlight{
animation:glowPulse 0.8s infinite alternate;
}

    @keyframes modalAppear{

0%{
opacity:0;
transform:scale(0.7) rotateX(40deg);
filter:blur(10px) brightness(2);
box-shadow:
0 0 0px #00f0ff,
0 0 0px #8a2be2;
}

40%{
opacity:1;
transform:scale(1.05) rotateX(0deg);
filter:blur(0) brightness(1.5);

box-shadow:
0 0 40px #00f0ff,
0 0 80px #8a2be2;
}

70%{
transform:scale(0.98);
}

100%{
transform:scale(1);
}
}

@keyframes glowPulse{
0%{
text-shadow:
0 0 5px #00f0ff,
0 0 10px #00f0ff;
}
100%{
text-shadow:
0 0 15px #00f0ff,
0 0 25px #00f0ff,
0 0 35px #8a2be2;
}
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Draftowe Centrum Kosmosu</a></li>
        <li><a href="draft.html">Kroniki Draftowe</a></li>
        <li><a href="stats.html">Galaktyczna Baza Wojowników</a></li>
    </ul>
</nav>

<div class="top-draft-nav">
    <button id="prevDraft">⬅ Poprzedni</button>
    <button id="nextDraft">Następny ➡</button>
</div>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1 id="draftTitle" data-text=""></h1>
    <div class="meta" id="draftMeta"></div>
</div>
    
<div class="winner-bg"></div>

<div class="podium-wrapper" id="podium"></div>

<div class="main-row">
    <div class="panel">
        <h2 class="section-title">AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Pkt</th>
                   <th>Pkt W.</th>
                   <th>Pkt P.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel results" id="resultsBox">
        <h2 class="section-title">WYNIKI</h2>
    </div>
</div>

<div class="draft-stats">
    <h2 class="section-title">STATYSTYKI DRAFTU</h2>
    <div class="stats-grid" id="statsGrid"></div>
</div>

<div class="decks-section">
    <h2 class="section-title">DECKI GRACZY</h2>
    <div class="decks-grid" id="decksContainer"></div>
</div>

<div class="creator-panel">
    <h3>PANEL TWÓRCY</h3>
    <button onclick="addMatch()">Dodaj mecz</button>
    <button onclick="generateMatchesCode()">Generuj kod matches</button>
    <button onclick="generateDecksCode()">Generuj kod players</button>
    <textarea id="codeOutput"></textarea>
    <hr style="margin:30px 0">

</div>
<script src="cards.js"></script>
<script src="database.js"></script>
<script>
    
let activePlayer = null;

const urlParams = new URLSearchParams(window.location.search);
const idParam = parseInt(urlParams.get("id"));

let draftsSorted = [...database.drafts].sort((a,b)=>b.id-a.id);
let draft = idParam 
  ? database.drafts.find(d=>d.id===idParam) 
  : draftsSorted[0];

if(!draft){
  document.getElementById("draftTitle").textContent = "Brak draftu";
  throw new Error("Draft not found");
}

/* META */
const title = "DRAFT " + draft.id;
const titleEl = document.getElementById("draftTitle");

titleEl.textContent = title;
titleEl.setAttribute("data-text", title);

let metaText = `Tryb: ${draft.mode}<br>`;
if(draft.startDate) metaText += `${draft.startDate}`;
if(draft.endDate) metaText += ` – ${draft.endDate}`;
metaText += `<br>Gracze: ${draft.players.length}`;
if(draft.bans && draft.bans.length>0)
  metaText += `<br>Bany: ${draft.bans.join(", ")}`;

document.getElementById("draftMeta").innerHTML = metaText;

/* NAV */
const ids = database.drafts.map(d=>d.id).sort((a,b)=>a-b);
const currentIndex = ids.indexOf(draft.id);

if(currentIndex>0)
  document.getElementById("prevDraft").onclick =
    ()=>window.location.href=`draft.html?id=${ids[currentIndex-1]}`;
else document.getElementById("prevDraft").style.display="none";

if(currentIndex<ids.length-1)
  document.getElementById("nextDraft").onclick =
    ()=>window.location.href=`draft.html?id=${ids[currentIndex+1]}`;
else document.getElementById("nextDraft").style.display="none";

/* KOLORY */
const playerColors=[
"#00f0ff","#ff00ff","#00ff88","#ffd700",
"#ff4d4d","#7d5cff","#00ffcc","#ff8800",
"#ffffff","#66ccff","#ff66cc","#aaff00"
];

/* STATY */
let stats={};

draft.players.forEach((p,i)=>{

stats[p.name]={
wins:0,
losses:0,
total:0,
winPoints:0,
lossPoints:0,
color:playerColors[i%playerColors.length]
};

});


draft.matches.forEach(m=>{
  if(m.pts1>m.pts2){

stats[m.p1].wins++;
stats[m.p2].losses++;

stats[m.p1].winPoints+=m.pts1;
stats[m.p2].lossPoints+=m.pts2;

}else{

stats[m.p2].wins++;
stats[m.p1].losses++;

stats[m.p2].winPoints+=m.pts2;
stats[m.p1].lossPoints+=m.pts1;

}

stats[m.p1].total+=m.pts1;
stats[m.p2].total+=m.pts2;

  const p1Color = stats[m.p1].color;
const p2Color = stats[m.p2].color;

document.getElementById("resultsBox")
  .innerHTML+=`
  <p>
    <span style="color:${p1Color};font-weight:bold;">${m.p1}</span> 
    ${m.pts1} – ${m.pts2} 
    <span style="color:${p2Color};font-weight:bold;">${m.p2}</span>
  </p>`;
});

    const unplayed = getUnplayedMatches(draft);

if(unplayed.length>0){

  document.getElementById("resultsBox").innerHTML += `
    <div class="unplayed-section">
      <h3>🕓 Nierozgrane mecze</h3>
      ${unplayed.map(m=>{

  const p1Color = stats[m.p1].color;
  const p2Color = stats[m.p2].color;

  return `
  <div class="unplayed-match">
    <span style="color:${p1Color};font-weight:bold;">${m.p1}</span>
    vs
    <span style="color:${p2Color};font-weight:bold;">${m.p2}</span>
  </div>
  `;
}).join("")}
    </div>
  `;

}else{

  document.getElementById("resultsBox").innerHTML += `
    <div class="unplayed-section">
      <h3>🔥 Wszystkie mecze rozegrane</h3>
    </div>
  `;

}

/* RANKING */
let ranking=Object.keys(stats).map(n=>({name:n,...stats[n]}));
ranking.sort((a,b)=>b.total-a.total);

    /* ===== TŁO ZWYCIĘZCY ===== */

if(ranking.length > 0){

  const winner = ranking[0].name;
  const draftId = draft.id;

  const winnerBg = document.querySelector(".winner-bg");

  const imagePath =
    "assets/decks/" +
    winner.toLowerCase().replace(/ /g,"").replace(/\./g,"") +
    "_" + draftId + ".jpg";

  winnerBg.style.backgroundImage = `url("${imagePath}")`;

}
    

ranking.forEach((p,i)=>{
  document.querySelector("#rankingTable tbody").innerHTML+=`
  <tr>
    <td>${i+1}</td>
<td 
class="player-name"
style="color:${p.color};font-weight:bold;cursor:pointer;"
onclick="selectPlayer('${p.name}')"
>
${p.name}
</td>
    <td>${p.wins}-${p.losses}</td>
    <td>${p.total}</td>
    <td>${p.winPoints}</td>
    <td>${p.lossPoints}</td>
  </tr>`;
});

/* PODIUM */
const medals=["🥇","🥈","🥉"];
const classes=["first","second","third"];

ranking.slice(0,3).forEach((p,i)=>{
  document.getElementById("podium").innerHTML+=`
  <div class="podium ${classes[i]}" style="border:2px solid ${p.color};box-shadow:0 0 25px ${p.color}">
    <div style="font-size:28px">${medals[i]}</div>
    <h3 style="color:${p.color}">${p.name}</h3>
    <div>${p.total} pkt</div>
  </div>`;
});

    /* STATYSTYKI DRAFTU */

function addStat(title, value){
  document.getElementById("statsGrid").innerHTML += `
    <div class="stat-box">
      <strong>${title}</strong>
      <div style="margin-top:10px">${value}</div>
    </div>
  `;
}

/* Najwięcej zwycięstw */
let maxWins = Math.max(...ranking.map(p=>p.wins));
let winLeaders = ranking
  .filter(p=>p.wins===maxWins)
  .map(p=>p.name)
  .sort()
  .slice(0,5);

addStat("🏆 Najwięcej zwycięstw",
  winLeaders.join(", ") + ` (${maxWins})`
);

/* Wygrane do 0 */
let cleanWins = {};
draft.players.forEach(p=>cleanWins[p.name]=0);

draft.matches.forEach(m=>{
  if(m.pts1>m.pts2 && m.pts2===0) cleanWins[m.p1]++;
  if(m.pts2>m.pts1 && m.pts1===0) cleanWins[m.p2]++;
});

let maxClean = Math.max(...Object.values(cleanWins));
let cleanLeaders = Object.keys(cleanWins)
  .filter(n=>cleanWins[n]===maxClean)
  .sort()
  .slice(0,5);

addStat("🔥 Najwięcej wygranych do 0",
  cleanLeaders.join(", ") + ` (${maxClean})`
);

/* Najwięcej pkt z porażek */
let lossPointsStat = {};
draft.players.forEach(p=>lossPointsStat[p.name]=0);

draft.matches.forEach(m=>{
  if(m.pts1>m.pts2){
    lossPointsStat[m.p2]+=m.pts2;
  }else{
    lossPointsStat[m.p1]+=m.pts1;
  }
});

let maxLoss = Math.max(...Object.values(lossPointsStat));

let lossLeaders = Object.keys(lossPointsStat)
  .filter(n=>lossPointsStat[n]===maxLoss)
  .sort()
  .slice(0,5);

addStat("💀 Najwięcej pkt z porażek",
  lossLeaders.join(", ") + ` (${maxLoss})`
);

/* Najmniej porażek */
let minLoss = Math.min(...ranking.map(p=>p.losses));
let leastLoss = ranking
  .filter(p=>p.losses===minLoss)
  .map(p=>p.name)
  .sort()
  .slice(0,5);

addStat("🛡 Najmniej porażek",
  leastLoss.join(", ") + ` (${minLoss})`
);

/* Najczęściej wybierana karta */
let cardCount = {};
draft.players.forEach(p=>{
  p.deck.forEach(c=>{
    cardCount[c] = (cardCount[c]||0)+1;
  });
});

if(Object.keys(cardCount).length>0){
  let maxPick = Math.max(...Object.values(cardCount));
  let mostPicked = Object.keys(cardCount)
    .filter(c=>cardCount[c]===maxPick)
    .sort()
    .slice(0,5);

  addStat("🃏 Najczęściej wybierana karta",
    mostPicked.join(", ") + ` (${maxPick})`
  );
}

/* DECKI */
draft.players.forEach((p,i)=>{

  const color=playerColors[i%playerColors.length];

  let imagePath =
  "assets/decks/" +
  p.name.toLowerCase().replace(/ /g,"").replace(/\./g,"") +

function getUnplayedMatches(draft){

    const played = new Set(
        draft.matches.map(m => 
            [m.p1, m.p2].sort().join("-")
        )
    );

    const missing = [];

    for(let i=0;i<draft.players.length;i++){
        for(let j=i+1;j<draft.players.length;j++){

            const p1 = draft.players[i].name;
            const p2 = draft.players[j].name;

            const key = [p1,p2].sort().join("-");

            if(!played.has(key)){
                missing.push({p1,p2});
            }
        }
    }

    return missing;
}

function selectPlayer(name){

if(activePlayer === name){
closePlayerModal();

return;
}

function closePlayerModal(){
document.getElementById("playerModal").classList.add("hidden");

document.querySelectorAll(".highlight").forEach(el=>{
el.classList.remove("highlight");
});
}

function openPlayerModal(name){

const modal = document.getElementById("playerModal");
modal.classList.remove("hidden");

document.getElementById("modalTitle").innerHTML =
`DRAFT ${draft.id} — ${name}`;

const player = ranking.find(p=>p.name===name);

    const playerMatches = draft.matches
.filter(m=>m.p1===name || m.p2===name);

/* FORMA */
const lastMatches = playerMatches.slice(-5);

let form = "";
lastMatches.forEach(m=>{
let isWin =
(m.p1===name && m.pts1>m.pts2) ||
(m.p2===name && m.pts2>m.pts1);

form += isWin ? "🟢" : "🔴";
});

/* STREAK */
let streak = 0;

for(let i = playerMatches.length - 1; i >= 0; i--){
const m = playerMatches[i];

let isWin =
(m.p1===name && m.pts1>m.pts2) ||
(m.p2===name && m.pts2>m.pts1);

if(isWin){
streak++;
}else{
break;
}
}

/* MOMENTUM */
let momentum = "⚪ Neutralny";
let momentumColor = "#aaa";

if(streak >= 3){
momentum = "🔥 HOT";
momentumColor = "#ff00ff";
}
else if(streak === 2){
momentum = "⚡ Rośnie";
momentumColor = "#00f0ff";
}
else if(streak === 1){
momentum = "🟢 Plus";
momentumColor = "#00ff88";
}
else if(playerMatches.length){
momentum = "❄️ Spadek";
momentumColor = "#888";
}

const matchesPlayed = draft.matches.filter(m=>m.p1===name || m.p2===name);

const totalMatches = matchesPlayed.length;

const avgPoints = totalMatches
? (player.total / totalMatches).toFixed(1)
: 0;

/* przewidywane */
const remaining = (draft.players.length - 1) - totalMatches;

const predicted = Math.round(player.total + (avgPoints * remaining));

/* przewidywane miejsce */
let simulated = ranking.map(p=>{
if(p.name === name){
return {...p, total:predicted};
}
return p;
}).sort((a,b)=>b.total-a.total);

const predictedPlace = simulated.findIndex(p=>p.name===name)+1;

document.getElementById("playerInfo").innerHTML = `
<div>Pozycja<br><b>${ranking.indexOf(player)+1}</b></div>
<div>Punkty<br><b>${player.total}</b></div>
<div>Bilans<br><b>${player.wins}-${player.losses}</b></div>
<div>Śr. pkt<br><b>${avgPoints}</b></div>
<div>Prognoza<br><b>${predicted}</b></div>
<div>Prog. miejsce<br><b>${predictedPlace}</b></div>
<div>Forma<br><b>${form || "-"}</b></div>
<div>Momentum<br><b style="color:${momentumColor}">${momentum}</b></div>
`;

let playedHTML = "";
draft.matches.forEach(m=>{
if(m.p1===name || m.p2===name){
playedHTML += `<div>${m.p1} ${m.pts1} – ${m.pts2} ${m.p2}</div>`;
}
});

document.getElementById("playerPlayed").innerHTML = playedHTML;

const unplayed = getUnplayedMatches(draft);

let unplayedHTML = "";
unplayed.forEach(m=>{
if(m.p1===name || m.p2===name){
unplayedHTML += `<div>${m.p1} vs ${m.p2}</div>`;
}
});

document.getElementById("playerUnplayed").innerHTML = unplayedHTML;
}

document.querySelectorAll("#resultsBox p").forEach(p=>{
if(p.innerText.includes(name)){
p.classList.add("highlight");

}

document.querySelectorAll(".unplayed-match").forEach(el=>{
if(el.innerText.includes(name)){
el.classList.add("highlight");
}else{

}
});

}
