<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}
nav img{ height:60px; }

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px 20px 20px;
}
.header h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin:0;
}
.meta{ opacity:0.8; }

/* MAIN */
.main-row{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:40px;
}

.panel{
    background:rgba(0,0,40,0.8);
    padding:30px;
    border-radius:20px;
}

table{
    border-collapse:collapse;
    min-width:650px;
}
th,td{
    padding:10px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}
th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

/* PODIUM */
.podium-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin:30px 0;
}
.podium{
    width:160px;
    text-align:center;
    padding:20px;
    border-radius:20px;
    background:rgba(0,0,60,0.8);
}
.first{height:200px;}
.second{height:160px;}
.third{height:140px;}

/* STATS */
.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:40px;
}
.stat-box{
    padding:20px;
    background:rgba(0,0,60,0.7);
    border-radius:18px;
}

/* DECKI */
.decks-section{ padding:60px; }
.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}
.deck-card{
    padding:20px;
    border-radius:20px;
    background:rgba(0,0,30,0.8);
}
.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}
.card-tile{
    font-size:12px;
    padding:4px;
    border-radius:6px;
}

/* DEV TOOL */
.dev-panel{
    margin:60px;
    padding:30px;
    background:rgba(0,0,50,0.9);
    border-radius:20px;
}
select,input,button{
    margin:5px;
}
textarea{
    width:100%;
    height:150px;
    margin-top:20px;
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
</nav>

<div class="header">
    <h1 id="draftTitle"></h1>
    <div class="meta" id="draftMeta"></div>
</div>

<div class="podium-wrapper" id="podium"></div>

<div class="main-row">
    <div class="panel">
        <h2>TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>W-L</th>
                    <th>Pkt</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="stats-grid" id="statsGrid"></div>

<div class="decks-section">
    <h2>DECKI</h2>
    <div class="decks-grid" id="decksContainer"></div>
</div>

<div class="dev-panel">
    <h2>DEV TOOL</h2>

    <h3>Buduj Deck</h3>
    <select id="playerSelect"></select>
    <select id="cardSelect"></select>
    <button onclick="addCardToDeck()">Dodaj kartę</button>

    <h3>Dodaj Mecz</h3>
    <select id="mP1"></select>
    <select id="mP2"></select>
    <input type="number" id="pts1" placeholder="Pkt 1">
    <input type="number" id="pts2" placeholder="Pkt 2">
    <button onclick="addMatchClick()">Dodaj mecz</button>

    <button onclick="generatePlayersJSON()">Generuj players JSON</button>
    <button onclick="generateMatchesJSON()">Generuj matches JSON</button>

    <textarea id="devOutput"></textarea>
</div>

<script src="database.js"></script>
<script src="cards.js"></script>

<script>

/* LOAD DRAFT */
const urlParams=new URLSearchParams(window.location.search);
const idParam=parseInt(urlParams.get("id"));
let draft=idParam?database.drafts.find(d=>d.id===idParam)
                :database.drafts.sort((a,b)=>b.id-a.id)[0];

document.getElementById("draftTitle").textContent="DRAFT "+draft.id;
document.getElementById("draftMeta").textContent=draft.mode;

/* STATS */
let stats={};
let cleanWins={};
let lossPoints={};

draft.players.forEach(p=>{
    stats[p.name]={wins:0,losses:0,total:0};
    cleanWins[p.name]=0;
    lossPoints[p.name]=0;
});

draft.matches.forEach(m=>{
    let diff=Math.abs(m.pts1-m.pts2);
    if(m.pts1>m.pts2){
        stats[m.p1].wins++; stats[m.p2].losses++;
        if(m.pts2===0) cleanWins[m.p1]++;
        lossPoints[m.p2]+=m.pts2;
    }else{
        stats[m.p2].wins++; stats[m.p1].losses++;
        if(m.pts1===0) cleanWins[m.p2]++;
        lossPoints[m.p1]+=m.pts1;
    }
    stats[m.p1].total+=m.pts1;
    stats[m.p2].total+=m.pts2;
});

/* RANKING */
let ranking=Object.keys(stats).map(n=>({name:n,...stats[n]}));
ranking.sort((a,b)=>b.total-a.total);

/* TABLE */
ranking.forEach((p,i)=>{
document.querySelector("#rankingTable tbody").innerHTML+=
`<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.wins}-${p.losses}</td>
<td>${p.total}</td>
</tr>`;
});

/* PODIUM */
const medals=["🥇","🥈","🥉"];
ranking.slice(0,3).forEach((p,i)=>{
document.getElementById("podium").innerHTML+=
`<div class="podium ${["first","second","third"][i]}">
<div style="font-size:26px">${medals[i]}</div>
<h3>${p.name}</h3>
<div>${p.total} pkt</div>
</div>`;
});

/* MOST CLEAN WINS */
let maxClean=Math.max(...Object.values(cleanWins));
let cleanLeaders=Object.keys(cleanWins)
.filter(n=>cleanWins[n]===maxClean)
.sort()
.slice(0,5);

addStat("Najwięcej wygranych 0",
cleanLeaders.join(", ")+" ("+maxClean+")");

/* MOST LOSS PTS */
let maxLossPts=Math.max(...Object.values(lossPoints));
let lossLeaders=Object.keys(lossPoints)
.filter(n=>lossPoints[n]===maxLossPts)
.sort()
.slice(0,5);

addStat("Najwięcej pkt z porażek",
lossLeaders.join(", ")+" ("+maxLossPts+")");

/* MOST PICKED CARD */
let cardCount={};
draft.players.forEach(p=>{
p.deck.forEach(c=>cardCount[c]=(cardCount[c]||0)+1);
});
let maxPick=Math.max(...Object.values(cardCount));
let cardLeaders=Object.keys(cardCount)
.filter(c=>cardCount[c]===maxPick)
.sort()
.slice(0,5);

addStat("Najczęściej wybierana karta",
cardLeaders.join(", ")+" ("+maxPick+")");

function addStat(title,val){
document.getElementById("statsGrid").innerHTML+=
`<div class="stat-box"><strong>${title}</strong><div>${val}</div></div>`;
}

/* DECKS */
draft.players.forEach(p=>{
let clean=p.name.toLowerCase().replace(/[^a-z0-9]/g,"");
let html=`<div class="deck-card">
<h3>${p.name}</h3>
<div class="cards-grid">`;
p.deck.forEach(c=>html+=`<div class="card-tile">${c}</div>`);
html+=`</div>
<img src="assets/decks/${clean}_${draft.id}.jpg" style="width:60%;margin-top:10px;">
</div>`;
document.getElementById("decksContainer").innerHTML+=html;
});

/* DEV TOOL INIT */
const playerSelect=document.getElementById("playerSelect");
const cardSelect=document.getElementById("cardSelect");
const mP1=document.getElementById("mP1");
const mP2=document.getElementById("mP2");

draft.players.forEach(p=>{
[playerSelect,mP1,mP2].forEach(sel=>{
let o=document.createElement("option");
o.value=p.name; o.text=p.name;
sel.appendChild(o);
});
});

cards.forEach(c=>{
let o=document.createElement("option");
o.value=c.name; o.text=c.name;
cardSelect.appendChild(o);
});

function addCardToDeck(){
let player=playerSelect.value;
let card=cardSelect.value;
draft.players.find(p=>p.name===player).deck.push(card);
alert("Dodano kartę");
}

function addMatchClick(){
let p1=mP1.value;
let p2=mP2.value;
let pts1=parseInt(document.getElementById("pts1").value);
let pts2=parseInt(document.getElementById("pts2").value);
draft.matches.push({p1,p2,pts1,pts2});
alert("Dodano mecz");
}

function generatePlayersJSON(){
document.getElementById("devOutput").value=
JSON.stringify(draft.players,null,2);
}

function generateMatchesJSON(){
document.getElementById("devOutput").value=
JSON.stringify(draft.matches,null,2);
}

</script>
</body>
</html>
