<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px 20px 20px;
}

.header img{
    height:180px;
    display:block;
    margin:0 auto 20px;
    filter:drop-shadow(0 0 40px #00f0ff);
}

.header h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin:0;
    text-shadow:0 0 20px #00f0ff,0 0 40px #8a2be2;
}

.meta{
    margin-top:15px;
    opacity:0.8;
}

/* NAVIGATION */
.draft-navigation{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:30px 0;
}

.draft-navigation button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    font-weight:bold;
    cursor:pointer;
}

/* MAIN */
.main-row{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:60px;
    align-items:flex-start;
}

.panel{
    background:rgba(0,0,40,0.75);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,240,255,0.3);
}

.panel h2{
    font-family:'Orbitron', sans-serif;
    margin-top:0;
    text-align:center;
}

table{
    border-collapse:collapse;
    min-width:700px;
}

th, td{
    padding:12px 18px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.results{
    max-height:420px;
    overflow-y:auto;
    width:280px;
}

/* DECKI */
.decks-section{
    padding:80px 60px;
}

.decks-section h2{
    text-align:center;
    font-size:48px;
    font-family:'Orbitron', sans-serif;
    margin-bottom:60px;
}

.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}

.deck-card{
    padding:30px;
    border-radius:20px;
    background:rgba(0,0,30,0.8);
}

.deck-card img{
    width:50%;
    max-width:350px;
    display:block;
    margin:20px auto 0;
    border-radius:15px;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:20px;
}

.card-tile{
    padding:6px 6px;
    font-size:13px;
    border-radius:8px;
    text-align:center;
}

/* ORGANIZER */
.organizer{
    margin:80px auto;
    max-width:900px;
    background:rgba(0,0,50,0.8);
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 40px #00f0ff;
}

.organizer h3{
    text-align:center;
    font-family:'Orbitron', sans-serif;
}

.organizer button{
    margin:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00f0ff;
    cursor:pointer;
    font-weight:bold;
}

textarea{
    width:100%;
    height:150px;
    margin-top:20px;
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Strona Główna</a></li>
        <li><a href="draft.html">Wszystkie drafty</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1 id="draftTitle"></h1>
    <div class="meta" id="draftMeta"></div>
</div>

<div class="draft-navigation">
    <button id="prevDraft">⬅ Poprzedni</button>
    <button id="nextDraft">Następny ➡</button>
</div>

<div class="main-row">

    <div class="panel">
        <h2>AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Pkt łączne</th>
                    <th>Pkt wygr.</th>
                    <th>Pkt przegr.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel results" id="resultsBox">
        <h2>WYNIKI</h2>
    </div>

</div>

<div class="decks-section">
    <h2>DECKI GRACZY</h2>
    <div class="decks-grid" id="decksContainer"></div>
</div>

<div class="organizer">
    <h3>PANEL ORGANIZATORA</h3>
    <button onclick="addMatch()">Dodaj mecz</button>
    <button onclick="generateMatchesCode()">Generuj kod matches</button>
    <button onclick="generateDecksCode()">Generuj kod players</button>
    <textarea id="codeOutput"></textarea>
</div>

<script src="database.js"></script>
<script src="cards.js"></script>

<script>

/* ===== WYBÓR DRAFTU ===== */

const urlParams = new URLSearchParams(window.location.search);
const idParam = parseInt(urlParams.get("id"));

let draftsSorted = [...database.drafts].sort((a,b)=>b.id-a.id);

let draft;

if(idParam){
    draft = database.drafts.find(d=>d.id===idParam);
}else{
    draft = draftsSorted[0];
}

document.getElementById("draftTitle").textContent = "DRAFT " + draft.id;
document.getElementById("draftMeta").textContent =
    `Tryb: ${draft.mode} | ${draft.startDate || ""} ${draft.endDate ? "– "+draft.endDate : ""}`;

/* ===== NAWIGACJA ===== */

const ids = database.drafts.map(d=>d.id).sort((a,b)=>a-b);
const currentIndex = ids.indexOf(draft.id);

if(currentIndex > 0){
    document.getElementById("prevDraft").onclick = ()=>{
        window.location.href = `draft.html?id=${ids[currentIndex-1]}`;
    };
}else{
    document.getElementById("prevDraft").style.display="none";
}

if(currentIndex < ids.length-1){
    document.getElementById("nextDraft").onclick = ()=>{
        window.location.href = `draft.html?id=${ids[currentIndex+1]}`;
    };
}else{
    document.getElementById("nextDraft").style.display="none";
}

/* ===== KOLORY ===== */

const playerColors = [
  "#00f0ff","#ff00ff","#00ff88","#ffd700",
  "#ff4d4d","#7d5cff","#00ffcc","#ff8800",
  "#ffffff","#66ccff","#ff66cc","#aaff00"
];

/* ===== STATYSTYKI ===== */

let stats={};

draft.players.forEach((p,i)=>{
    stats[p.name]={wins:0,losses:0,winPts:0,lossPts:0,total:0,color:playerColors[i%playerColors.length]};
});

draft.matches.forEach(m=>{
    if(m.pts1>m.pts2){
        stats[m.p1].wins++; stats[m.p2].losses++;
        stats[m.p1].winPts+=m.pts1; stats[m.p2].lossPts+=m.pts2;
    }else{
        stats[m.p2].wins++; stats[m.p1].losses++;
        stats[m.p2].winPts+=m.pts2; stats[m.p1].lossPts+=m.pts1;
    }

    stats[m.p1].total+=m.pts1;
    stats[m.p2].total+=m.pts2;

    document.getElementById("resultsBox")
      .innerHTML+=`<p>${m.p1} ${m.pts1} – ${m.pts2} ${m.p2}</p>`;
});

let ranking=Object.keys(stats).map(n=>({name:n,...stats[n]}));
ranking.sort((a,b)=>b.total-a.total);

ranking.forEach((p,i)=>{
    document.querySelector("#rankingTable tbody")
    .innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td style="color:${p.color};text-shadow:0 0 10px ${p.color}">
        ${p.name}
      </td>
      <td>${p.wins}-${p.losses}</td>
      <td>${p.total}</td>
      <td>${p.winPts}</td>
      <td>${p.lossPts}</td>
    </tr>`;
});

/* ===== DECKI ===== */

draft.players.forEach((p,i)=>{
    const color=playerColors[i%playerColors.length];
    const clean=p.name.toLowerCase().replace(/[^a-z0-9]/g,"");

    let html=`
    <div class="deck-card" style="border:2px solid ${color};box-shadow:0 0 30px ${color}">
      <h3 style="color:${color};text-shadow:0 0 15px ${color};text-align:center;">
        ${p.name}
      </h3>
      <div class="cards-grid">
        ${p.deck.map(c=>`
          <div class="card-tile" style="
            color:${color};
            border:1px solid ${color};
            box-shadow:0 0 8px ${color};
          ">${c}</div>`).join("")}
      </div>
      <img src="assets/decks/${clean}_${draft.id}.jpg">
    </div>`;
    document.getElementById("decksContainer").innerHTML+=html;
});

/* ===== PANEL ===== */

function addMatch(){
    const p1=prompt("Gracz 1:");
    const p2=prompt("Gracz 2:");
    const pts1=parseInt(prompt("Pkt 1:"));
    const pts2=parseInt(prompt("Pkt 2:"));
    draft.matches.push({p1,p2,pts1,pts2});
    alert("Dodano (odśwież i wygeneruj kod)");
}

function generateMatchesCode(){
    document.getElementById("codeOutput").value=
    JSON.stringify(draft.matches,null,2);
}

function generateDecksCode(){
    document.getElementById("codeOutput").value=
    JSON.stringify(draft.players,null,2);
}

</script>

</body>
</html>
