<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Rajdhani', sans-serif;
background:url("assets/cosmic-bg.png") no-repeat center center fixed;
background-size:cover;
color:white;
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
backdrop-filter:blur(10px);
background:rgba(5,10,25,0.75);
}

nav img{
height:60px;
filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
list-style:none;
display:flex;
gap:40px;
}

nav a{
text-decoration:none;
color:white;
font-weight:600;
}

/* TOP NAV */

.top-draft-nav{
position:relative;
height:0;
}

.top-draft-nav button{
position:absolute;
top:10px;
padding:10px 18px;
border:none;
border-radius:10px;
background:#00f0ff;
font-weight:bold;
cursor:pointer;
z-index:100;
box-shadow:0 0 15px #00f0ff;
}

#prevDraft{ left:20px; }
#nextDraft{ right:20px; }

/* HEADER */

.header{
text-align:center;
padding:30px 20px 10px 20px;
}

.header img{
height:180px;
display:block;
margin:0 auto 20px;
filter:drop-shadow(0 0 40px #00f0ff);
}

.header h1{
font-family:'Orbitron';
font-size:64px;
margin:0;
text-shadow:0 0 20px #00f0ff,0 0 40px #8a2be2;
}

.meta{
margin-top:15px;
opacity:0.9;
line-height:1.6;
}

.section-title{
text-align:center;
font-family:'Orbitron';
text-shadow:0 0 15px #8a2be2;
}

/* PODIUM */

.podium-wrapper{
display:flex;
justify-content:center;
align-items:flex-end;
gap:40px;
margin:40px 0 20px 0;
}

.podium{
width:160px;
text-align:center;
border-radius:20px;
padding:20px;
backdrop-filter:blur(10px);
background:rgba(0,0,40,0.7);
}

.first{height:200px;}
.second{height:160px;}
.third{height:140px;}

/* TABLE */

.main-row{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
align-items:flex-start;
}

.panel{
background:rgba(0,0,40,0.75);
backdrop-filter:blur(12px);
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,240,255,0.3);
}

table{
border-collapse:collapse;
min-width:700px;
}

th,td{
padding:12px 18px;
border:1px solid rgba(0,255,255,0.3);
text-align:center;
}

th{
background:linear-gradient(45deg,#00f0ff,#8a2be2);
color:black;
}

.results{
max-height:420px;
overflow-y:auto;
width:280px;
}

/* STATYSTYKI — tylko układ poprawiony */

.draft-stats{
margin:60px auto;
max-width:1100px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:25px;
max-width:1100px;
margin:0 auto;
}

.stats-grid .stat-box:nth-child(1){grid-column:1/3;}
.stats-grid .stat-box:nth-child(2){grid-column:3/5;}
.stats-grid .stat-box:nth-child(3){grid-column:5/7;}

.stats-grid .stat-box:nth-child(4){grid-column:2/4;}
.stats-grid .stat-box:nth-child(5){grid-column:4/6;}

.stat-box{
padding:20px;
border-radius:18px;
background:rgba(0,0,50,0.7);
box-shadow:0 0 25px rgba(0,240,255,0.4);
}

/* DECKS */

.decks-section{
padding:60px;
}

.decks-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:40px;
}

.deck-card{
padding:30px;
border-radius:20px;
background:rgba(0,0,30,0.8);
}

.cards-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:20px;
}

.card-tile{
padding:6px;
font-size:13px;
border-radius:8px;
text-align:center;
}

/* DECK IMAGE BACK */

.deck-card img{
width:60%;
max-width:350px;
display:block;
margin:20px auto 0;
border-radius:15px;
}

/* CREATOR */

.creator-panel{
margin-top:80px;
padding:30px 60px;
background:rgba(5,10,25,0.75);
backdrop-filter:blur(10px);
border-top:2px solid #00f0ff;
}

textarea{
width:100%;
height:150px;
margin-top:20px;
}

</style>
</head>

<body>

<nav>
<img src="assets/msp-logo.png">
<ul>
<li><a href="index.html">Strona Główna</a></li>
<li><a href="draft.html">Wszystkie drafty</a></li>
<li><a href="stats.html">Statystyki</a></li>
</ul>
</nav>

<div class="top-draft-nav">
<button id="prevDraft">⬅ Poprzedni</button>
<button id="nextDraft">Następny ➡</button>
</div>

<div class="header">
<img src="assets/draft-logo.png">
<h1 id="draftTitle"></h1>
<div id="draftMeta" class="meta"></div>
</div>

<div id="podium" class="podium-wrapper"></div>

<div class="main-row">

<div class="panel">

<h2 class="section-title">AKTUALNA TABELA</h2>

<table id="rankingTable">

<thead>

<tr>

<th>#</th>

<th>Gracz</th>

<th>Bilans</th>

<th>Pkt</th>

<th>Wygr.</th>

<th>Przegr.</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<div class="panel results" id="resultsBox">

<h2 class="section-title">WYNIKI</h2>

</div>

</div>

<div class="draft-stats">

<h2 class="section-title">STATYSTYKI DRAFTU</h2>

<div id="statsGrid" class="stats-grid"></div>

</div>

<div class="decks-section">

<h2 class="section-title">DECKI GRACZY</h2>

<div id="decksContainer" class="decks-grid"></div>

</div>

<div class="creator-panel">

<h3>PANEL TWÓRCY</h3>

<button onclick="addMatch()">Dodaj mecz</button>

<button onclick="generateMatchesCode()">Generuj kod matches</button>

<button onclick="generateDecksCode()">Generuj kod players</button>

<textarea id="codeOutput"></textarea>

</div>

<script src="database.js"></script>

<script src="cards.js"></script>

</body>
</html>
