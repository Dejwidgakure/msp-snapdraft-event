<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.7);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

.section{
    padding:100px 40px;
    text-align:center;
}

.section img{
    height:120px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 30px #00f0ff);
}

h1{
    font-family:'Orbitron', sans-serif;
    font-size:50px;
    text-shadow:0 0 20px #00f0ff;
}

table{
    margin:50px auto;
    border-collapse:collapse;
    background:rgba(0,0,30,0.6);
    backdrop-filter:blur(10px);
    min-width:900px;
}

th, td{
    padding:14px 20px;
    border:1px solid rgba(0,255,255,0.3);
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

tr:hover{
    background:rgba(0,255,255,0.1);
}

.decks{
    margin-top:100px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.deck{
    background:rgba(0,0,40,0.7);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.3);
}

.deck h3{
    font-family:'Orbitron', sans-serif;
    color:#00f0ff;
}

.results{
    margin-top:120px;
    background:rgba(0,0,40,0.8);
    padding:40px;
    border-radius:20px;
}
</style>
</head>
<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Strona Główna</a></li>
        <li><a href="history.html">Historia</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<div class="section">
    <img src="assets/draft-logo.png">
    <h1>Draft 18</h1>

    <!-- TABELA -->
    <table>
        <tr>
            <th>Gracz</th>
            <th>Bilans</th>
            <th>Punkty łączne</th>
            <th>Pkt za porażki</th>
            <th>Pkt za zwycięstwa</th>
        </tr>

        <tr>
            <td>Dejwid</td>
            <td>0-0</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>

        <tr>
            <td>Void</td>
            <td>0-0</td>
            <td>0</td>
            <td>0</td>
            <td>0</td>
        </tr>

        <!-- DODASZ RESZTĘ 11 GRACZY -->
    </table>

    <!-- DECKI -->
    <div class="decks">
        <div class="deck">
            <h3>DEJWID</h3>
            <p>Thanos</p>
            <p>Mockingbird</p>
            <p>Black Knight</p>
        </div>

        <div class="deck">
            <h3>VOID</h3>
            <p>Blob</p>
            <p>Destroyer</p>
            <p>Venom</p>
        </div>
    </div>

    <!-- WYNIKI -->
    <div class="results">
        <h2>Wyniki</h2>
        <p>Dejwid pokonał Maniek 21–4</p>
        <p>Void pokonał Pluton 18–9</p>
    </div>

</div>

</body>
</html>
