<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

h1,h2{
    font-family:'Orbitron', sans-serif;
}

.header{
    text-align:center;
    padding:60px 20px;
}

.header img{
    height:120px;
    display:block;
    margin:0 auto 20px;
    filter:drop-shadow(0 0 30px #00f0ff);
}

.layout{
    display:flex;
    gap:40px;
    padding:40px;
}

.table-box, .results-box{
    flex:1;
    background:rgba(0,0,30,0.7);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,255,255,0.3);
}

.results-box{
    max-height:600px;
    overflow-y:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid rgba(0,255,255,0.3);
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.leader{
    background:rgba(0,255,255,0.2);
}

.decks-section{
    padding:80px 40px;
}

.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}

.deck-card{
    background:rgba(0,0,40,0.85);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 35px #00f0ff;
}

.deck-card img{
    width:100%;
    margin-top:15px;
    border-radius:15px;
    box-shadow:0 0 25px #8a2be2;
}

.deck-card table{
    margin-top:15px;
}

.admin-panel{
    margin-top:120px;
    padding:40px;
    background:rgba(0,0,20,0.85);
}
</style>
</head>
<body>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1>DRAFT 18</h1>
</div>

<div class="layout">
    <div class="table-box">
        <h2>AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>Miejsce</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Punkty</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="results-box">
        <h2>WYNIKI</h2>
        <div id="resultsBox"></div>
    </div>
</div>

<div class="decks-section">
    <h1 style="text-align:center;">DECKI GRACZY</h1>
    <div class="decks-grid" id="decksGrid"></div>
</div>

<div class="admin-panel">
    <h2>Panel organizatora</h2>
</div>

<script src="./draft18-data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

let matchesData = [...matches];

const tableBody = document.querySelector("#rankingTable tbody");
const resultsBox = document.getElementById("resultsBox");
const decksGrid = document.getElementById("decksGrid");

function renderTable(){
    tableBody.innerHTML="";
    resultsBox.innerHTML="";

    let stats={};

    players.forEach(p=>{
        stats[p.name]={wins:0,losses:0,total:0};
    });

    matchesData.forEach(m=>{
        const {p1,p2,pts1,pts2}=m;

        if(pts1>pts2){
            stats[p1].wins++;
            stats[p2].losses++;
        } else {
            stats[p2].wins++;
            stats[p1].losses++;
        }

        stats[p1].total+=pts1;
        stats[p2].total+=pts2;

        const line=document.createElement("p");
        line.textContent=`${p1} ${pts1} – ${pts2} ${p2}`;
        resultsBox.appendChild(line);
    });

    let ranking=Object.keys(stats).map(name=>({name,...stats[name]}));
    ranking.sort((a,b)=>b.total-a.total);

    ranking.forEach((player,i)=>{
        const row=document.createElement("tr");
        if(i===0 && player.total>0) row.classList.add("leader");

        row.innerHTML=`
            <td>${i+1}</td>
            <td>${player.name}</td>
            <td>${player.wins}-${player.losses}</td>
            <td>${player.total}</td>
        `;
        tableBody.appendChild(row);
    });
}

function renderDecks(){
    decksGrid.innerHTML="";

    players.forEach(p=>{
        const card=document.createElement("div");
        card.className="deck-card";

        let deckTable="<table>";
        p.deck.forEach(cardName=>{
            deckTable+=`<tr><td>${cardName}</td></tr>`;
        });
        deckTable+="</table>";

        const cleanName=p.name.toLowerCase().replace(/[^a-z0-9]/g,"");

        card.innerHTML=`
            <h2>${p.name}</h2>
            ${deckTable}
            <img src="assets/decks/${cleanName}_18.jpg" alt="${p.name}">
        `;

        decksGrid.appendChild(card);
    });
}

renderTable();
renderDecks();

});
</script>

</body>
</html>
