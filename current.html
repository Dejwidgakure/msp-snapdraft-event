<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.7);
}

nav .left{
    display:flex;
    align-items:center;
    gap:20px;
}

nav img{
    height:65px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
    transition:0.3s;
}

nav a:hover{
    color:#00f0ff;
}

.hero{
    text-align:center;
    padding:140px 20px;
}

.hero img{
    height:140px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 30px #00f0ff);
}

.hero h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin:0;
    text-shadow:0 0 25px #00f0ff;
}

.hero p{
    margin-top:20px;
    font-size:20px;
    opacity:0.85;
}

.btn{
    margin-top:40px;
    display:inline-block;
    padding:15px 40px;
    border-radius:40px;
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
    font-weight:700;
    text-decoration:none;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<nav>
    <div class="left">
        <img src="assets/msp-logo.png">
    </div>

    <ul>
        <li><a href="current.html">Aktualny Draft</a></li>
        <li><a href="history.html">Historia</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<div class="hero">
    <img src="assets/draft-logo.png">
    <h1>MSP SnapDraft Event</h1>
    <p>Oficjalna Liga Draftowa Marvel Snap Polska</p>
    <a class="btn" href="current.html">Zobacz Aktualny Draft</a>
</div>

</body>
</html>
