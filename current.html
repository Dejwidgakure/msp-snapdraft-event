<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

.section{
    padding:80px 40px;
    text-align:center;
}

h1{
    font-family:'Orbitron', sans-serif;
    font-size:48px;
    text-shadow:0 0 25px #00f0ff;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
    font-weight:700;
    cursor:pointer;
    margin-top:20px;
    box-shadow:0 0 20px #00f0ff;
}

form{
    margin-top:20px;
}

input, select{
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

table{
    margin:40px auto;
    border-collapse:collapse;
    background:rgba(0,0,30,0.7);
    backdrop-filter:blur(10px);
    min-width:1000px;
    box-shadow:0 0 40px rgba(0,255,255,0.4);
}

th, td{
    padding:12px 16px;
    border:1px solid rgba(0,255,255,0.3);
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.leader{
    background:rgba(0,255,255,0.2);
}

.results{
    margin-top:60px;
    background:rgba(0,0,40,0.8);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 30px #8a2be2;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}

.decks{
    margin-top:80px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

.deck-card{
    background:rgba(0,0,40,0.8);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px #00f0ff;
    transition:0.3s;
}

.deck-card:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px #8a2be2;
}

.deck-card h3{
    margin-top:0;
    text-shadow:0 0 10px #00f0ff;
}
</style>
</head>
<body>

<nav>
    <img src="assets/msp-logo.png">
</nav>

<div class="section">
    <img src="assets/draft-logo.png" style="height:100px;">
    <h1>Draft 18</h1>

    <button onclick="toggleForm()">Dodaj mecz</button>

    <form id="matchForm" style="display:none;">
        <select id="p1"></select>
        <input type="number" id="pts1" placeholder="Pkt 1">
        <select id="p2"></select>
        <input type="number" id="pts2" placeholder="Pkt 2">
        <button type="button" onclick="addMatch()">Zapisz</button>
    </form>

    <table id="rankingTable">
        <thead>
            <tr>
                <th>Miejsce</th>
                <th>Gracz</th>
                <th>Bilans</th>
                <th>Punkty łączne</th>
                <th>Pkt za zwycięstwa</th>
                <th>Pkt za porażki</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="results" id="resultsBox">
        <h2>Wyniki</h2>
    </div>

    <div class="decks" id="decksBox">
        <h2 style="grid-column:1/-1;">Decki graczy</h2>
    </div>
</div>

<script src="./draft18-data.js"></script>

<script>
let matchesData = [...matches];

const tableBody = document.querySelector("#rankingTable tbody");
const resultsBox = document.getElementById("resultsBox");
const decksBox = document.getElementById("decksBox");

function render(){
    tableBody.innerHTML="";
    resultsBox.innerHTML="<h2>Wyniki</h2>";

    let stats = {};
    players.forEach(p=>{
        stats[p]={wins:0,losses:0,winPts:0,lossPts:0,total:0};
    });

    matchesData.forEach(m=>{
        const {p1,p2,pts1,pts2}=m;

        if(pts1>pts2){
            stats[p1].wins++;
            stats[p2].losses++;
            stats[p1].winPts+=pts1;
            stats[p2].lossPts+=pts2;
        } else {
            stats[p2].wins++;
            stats[p1].losses++;
            stats[p2].winPts+=pts2;
            stats[p1].lossPts+=pts1;
        }

        stats[p1].total+=pts1;
        stats[p2].total+=pts2;

        const line=document.createElement("p");
        line.textContent=`${p1} ${pts1} – ${pts2} ${p2}`;
        resultsBox.appendChild(line);
    });

    let ranking=Object.keys(stats).map(name=>({name,...stats[name]}));
    ranking.sort((a,b)=>b.total-a.total);

    ranking.forEach((player,i)=>{
        const row=document.createElement("tr");
        if(i===0 && player.total>0) row.classList.add("leader");

        row.innerHTML=`
            <td>${i+1}</td>
            <td>${player.name}</td>
            <td>${player.wins}-${player.losses}</td>
            <td>${player.total}</td>
            <td>${player.winPts}</td>
            <td>${player.lossPts}</td>
        `;
        tableBody.appendChild(row);
    });
}

function toggleForm(){
    const f=document.getElementById("matchForm");
    f.style.display=f.style.display==="none"?"block":"none";
}

function addMatch(){
    const p1=document.getElementById("p1").value;
    const p2=document.getElementById("p2").value;
    const pts1=parseInt(document.getElementById("pts1").value);
    const pts2=parseInt(document.getElementById("pts2").value);

    if(p1===p2) return alert("Gracze muszą być różni!");
    if(isNaN(pts1)||isNaN(pts2)) return alert("Podaj punkty!");

    matchesData.push({p1,p2,pts1,pts2});
    render();
}

function init(){
    const p1Select=document.getElementById("p1");
    const p2Select=document.getElementById("p2");

    players.forEach(p=>{
        p1Select.innerHTML+=`<option value="${p}">${p}</option>`;
        p2Select.innerHTML+=`<option value="${p}">${p}</option>`;

        const card=document.createElement("div");
        card.className="deck-card";
        card.innerHTML=`<h3>${p}</h3><p>Deck do uzupełnienia...</p>`;
        decksBox.appendChild(card);
    });

    render();
}

init();
</script>

</body>
</html>
