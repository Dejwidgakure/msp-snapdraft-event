<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* ===== NAV ===== */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* ===== HEADER ===== */
.header{
    text-align:center;
    padding-top:60px;
}

.header img{
    height:180px;
    display:block;
    margin:0 auto 20px;
    filter:drop-shadow(0 0 40px #00f0ff);
}

.header h1{
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin:0;
    text-shadow:0 0 20px #00f0ff,0 0 40px #8a2be2;
}

/* ===== LAYOUT ===== */
.main-row{
    display:flex;
    justify-content:center;
    gap:60px;
    padding:60px;
    align-items:flex-start;
}

.panel{
    background:rgba(0,0,40,0.75);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 30px rgba(0,240,255,0.3);
}

.panel h2{
    font-family:'Orbitron', sans-serif;
    margin-top:0;
    text-align:center;
}

/* ===== TABELA ===== */
table{
    border-collapse:collapse;
    min-width:650px;
}

th, td{
    padding:12px 18px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.leader{
    background:rgba(255,215,0,0.15);
}

/* ===== WYNIKI ===== */
.results{
    max-height:420px;
    overflow-y:auto;
    width:320px;
}

.results p{
    margin:8px 0;
}

/* ===== DECKI ===== */
.decks-section{
    padding:80px 60px;
}

.decks-section h2{
    text-align:center;
    font-size:48px;
    font-family:'Orbitron', sans-serif;
    margin-bottom:60px;
}

.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}

.deck-card{
    padding:30px;
    border-radius:20px;
    background:rgba(0,0,30,0.8);
    transition:0.3s;
}

.deck-card img{
    width:50%;
    max-width:400px;
    display:block;
    margin:20px auto 0;
    border-radius:15px;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:20px;
}

.card-tile{
    padding:6px 8px;
    font-size:14px;
    border-radius:8px;
    text-align:center;
}
</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Strona Główna</a></li>
        <li><a href="history.html">Historia</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1>DRAFT 18</h1>
</div>

<div class="main-row">

    <div class="panel">
        <h2>AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Pkt łączne</th>
                    <th>Pkt za wygr.</th>
                    <th>Pkt za przegr.</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="panel results" id="resultsBox">
        <h2>WYNIKI</h2>
    </div>

</div>

<div class="decks-section">
    <h2>DECKI GRACZY</h2>
    <div class="decks-grid" id="decksContainer"></div>
</div>

<script src="draft18-data.js"></script>

<script>
/* ===== KOLORY Z DRAFTU ===== */
const playerColors = [
  "#00f0ff", "#ff00ff", "#00ff88", "#ffd700",
  "#ff4d4d", "#7d5cff", "#00ffcc", "#ff8800",
  "#ffffff", "#66ccff", "#ff66cc", "#aaff00"
];

const tableBody = document.querySelector("#rankingTable tbody");
const resultsBox = document.getElementById("resultsBox");
const decksContainer = document.getElementById("decksContainer");

let stats = {};

players.forEach((p,i)=>{
    stats[p.name] = {
        wins:0,
        losses:0,
        winPts:0,
        lossPts:0,
        total:0,
        color: playerColors[i % playerColors.length]
    };
});

/* ===== MECZE ===== */
matches.forEach(m=>{
    const {p1,p2,pts1,pts2} = m;

    if(pts1 > pts2){
        stats[p1].wins++;
        stats[p2].losses++;
        stats[p1].winPts += pts1;
        stats[p2].lossPts += pts2;
    } else {
        stats[p2].wins++;
        stats[p1].losses++;
        stats[p2].winPts += pts2;
        stats[p1].lossPts += pts1;
    }

    stats[p1].total += pts1;
    stats[p2].total += pts2;

    const resultLine = document.createElement("p");
    resultLine.textContent = `${p1} ${pts1} – ${pts2} ${p2}`;
    resultsBox.appendChild(resultLine);
});

/* ===== SORTOWANIE ===== */
let ranking = Object.keys(stats).map(name=>({
    name,
    ...stats[name]
}));

ranking.sort((a,b)=>b.total - a.total);

/* ===== TABELA ===== */
ranking.forEach((player,i)=>{
    const row = document.createElement("tr");
    if(i===0 && player.total>0) row.classList.add("leader");

    row.innerHTML = `
        <td>${i+1}</td>
        <td style="color:${player.color}; text-shadow:0 0 12px ${player.color}">
            ${player.name}
        </td>
        <td>${player.wins}-${player.losses}</td>
        <td>${player.total}</td>
        <td>${player.winPts}</td>
        <td>${player.lossPts}</td>
    `;
    tableBody.appendChild(row);
});

/* ===== DECKI ===== */
players.forEach((p,i)=>{
    const color = playerColors[i % playerColors.length];

    const card = document.createElement("div");
    card.className="deck-card";
    card.style.border=`2px solid ${color}`;
    card.style.boxShadow=`0 0 30px ${color}`;

    card.innerHTML = `
        <h3 style="color:${color}; text-shadow:0 0 15px ${color}; text-align:center;">
            ${p.name}
        </h3>
    `;

    const cardsGrid = document.createElement("div");
    cardsGrid.className="cards-grid";

    p.deck.forEach(cardName=>{
        const tile = document.createElement("div");
        tile.className="card-tile";
        tile.textContent = cardName;
        tile.style.color=color;
        tile.style.border=`1px solid ${color}`;
        tile.style.boxShadow=`0 0 8px ${color}`;
        cardsGrid.appendChild(tile);
    });

    card.appendChild(cardsGrid);

    const clean = p.name.toLowerCase().replace(/[^a-z0-9]/g,"");
    const img = document.createElement("img");
    img.src = `assets/decks/${clean}_18.jpg`;
    card.appendChild(img);

    decksContainer.appendChild(card);
});
</script>

</body>
</html>
