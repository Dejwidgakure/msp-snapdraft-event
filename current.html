<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:rgba(5,10,25,0.85);
    backdrop-filter:blur(10px);
}

nav img{ height:70px; }

nav a{
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* HEADER */
.header{
    text-align:center;
    padding:70px 20px;
}

.header img{
    height:160px;
    display:block;
    margin:0 auto 25px;
    filter:drop-shadow(0 0 40px #00f0ff);
}

.header h1{
    font-family:'Orbitron', sans-serif;
    font-size:72px;
    margin:0;
    color:#00f0ff;
    text-shadow:
        0 0 10px #00f0ff,
        0 0 30px #00f0ff,
        0 0 60px #8a2be2;
}

/* LAYOUT */
.layout{
    display:flex;
    gap:30px;
    padding:40px 60px;
}

.table-box{
    flex:2;
    background:rgba(0,0,40,0.8);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,255,255,0.4);
}

.results-box{
    flex:1;
    background:rgba(0,0,40,0.8);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(138,43,226,0.6);
    max-height:600px;
    overflow-y:auto;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border:1px solid rgba(0,255,255,0.3);
    text-align:center;
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.leader{
    background:rgba(0,255,255,0.2);
}

/* DECKS */
.decks-section{
    padding:80px 60px;
}

.decks-section h2{
    text-align:center;
    font-family:'Orbitron', sans-serif;
    font-size:42px;
    margin-bottom:50px;
}

.decks-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:40px;
}

.deck-card{
    background:rgba(0,0,50,0.85);
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 35px #00f0ff;
}

.deck-card h3{
    margin-top:0;
    font-family:'Orbitron', sans-serif;
}

.cards-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:15px;
}

.card-tile{
    background:rgba(0,0,80,0.9);
    padding:6px;
    border-radius:8px;
    font-size:12px;
    text-align:center;
    box-shadow:0 0 8px #00f0ff;
    word-wrap:break-word;
}

.deck-card img{
    width:50%;
    max-width:350px;
    display:block;
    margin:20px auto 0;
    border-radius:15px;
    box-shadow:0 0 25px #8a2be2;
}

/* ADMIN */
.admin-panel{
    margin-top:120px;
    padding:40px 60px;
    background:rgba(0,0,20,0.9);
    border-top:2px solid #00f0ff;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:25px;
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
    font-weight:700;
    cursor:pointer;
    margin-top:15px;
}

input, select{
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

textarea{
    width:100%;
    height:250px;
    margin-top:20px;
    display:none;
    background:black;
    color:#00f0ff;
    padding:15px;
}
</style>
</head>
<body>

<nav>
    <img src="assets/msp-logo.png">
    <a href="index.html">← Powrót</a>
</nav>

<div class="header">
    <img src="assets/draft-logo.png">
    <h1>DRAFT 18</h1>
</div>

<div class="layout">
    <div class="table-box">
        <h2>AKTUALNA TABELA</h2>
        <table id="rankingTable">
            <thead>
                <tr>
                    <th>Miejsce</th>
                    <th>Gracz</th>
                    <th>Bilans</th>
                    <th>Punkty</th>
                    <th>Pkt za wygrane</th>
                    <th>Pkt za porażki</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="results-box">
        <h2>WYNIKI</h2>
        <div id="resultsBox"></div>
    </div>
</div>

<div class="decks-section">
    <h2>DECKI GRACZY</h2>
    <div class="decks-grid" id="decksGrid"></div>
</div>

<div class="admin-panel">
    <h2>Panel organizatora</h2>
</div>

<script src="./draft18-data.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

let matchesData=[...matches];

const tableBody=document.querySelector("#rankingTable tbody");
const resultsBox=document.getElementById("resultsBox");
const decksGrid=document.getElementById("decksGrid");

function renderTable(){
    tableBody.innerHTML="";
    resultsBox.innerHTML="";

    let stats={};
    players.forEach(p=>{
        stats[p.name]={wins:0,losses:0,total:0,winPts:0,lossPts:0};
    });

    matchesData.forEach(m=>{
        const {p1,p2,pts1,pts2}=m;

        if(pts1>pts2){
            stats[p1].wins++;
            stats[p2].losses++;
            stats[p1].winPts+=pts1;
            stats[p2].lossPts+=pts2;
        } else {
            stats[p2].wins++;
            stats[p1].losses++;
            stats[p2].winPts+=pts2;
            stats[p1].lossPts+=pts1;
        }

        stats[p1].total+=pts1;
        stats[p2].total+=pts2;

        const line=document.createElement("p");
        line.textContent=`${p1} ${pts1} – ${pts2} ${p2}`;
        resultsBox.appendChild(line);
    });

    let ranking=Object.keys(stats).map(name=>({name,...stats[name]}));
    ranking.sort((a,b)=>b.total-a.total);

    ranking.forEach((player,i)=>{
        const row=document.createElement("tr");
        if(i===0 && player.total>0) row.classList.add("leader");

        row.innerHTML=`
            <td>${i+1}</td>
            <td>${player.name}</td>
            <td>${player.wins}-${player.losses}</td>
            <td>${player.total}</td>
            <td>${player.winPts}</td>
            <td>${player.lossPts}</td>
        `;
        tableBody.appendChild(row);
    });
}

function renderDecks(){
    decksGrid.innerHTML="";
    players.forEach(p=>{
        const clean=p.name.toLowerCase().replace(/[^a-z0-9]/g,"");

        let cards="";
        p.deck.forEach(c=>{
            cards+=`<div class="card-tile">${c}</div>`;
        });

        const card=document.createElement("div");
        card.className="deck-card";
        card.innerHTML=`
            <h3>${p.name}</h3>
            <div class="cards-grid">${cards}</div>
            <img src="assets/decks/${clean}_18.jpg">
        `;
        decksGrid.appendChild(card);
    });
}

renderTable();
renderDecks();

});
</script>

</body>
</html>
