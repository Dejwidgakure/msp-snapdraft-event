<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Draft 18 | MSP SnapDraft Event</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

.section{
    padding:100px 40px;
    text-align:center;
}

.section img{
    height:120px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 30px #00f0ff);
}

h1{
    font-family:'Orbitron', sans-serif;
    font-size:48px;
    text-shadow:0 0 20px #00f0ff;
}

table{
    margin:50px auto;
    border-collapse:collapse;
    background:rgba(0,0,30,0.7);
    backdrop-filter:blur(10px);
    min-width:900px;
}

th, td{
    padding:14px 20px;
    border:1px solid rgba(0,255,255,0.3);
}

th{
    background:linear-gradient(45deg,#00f0ff,#8a2be2);
    color:black;
}

.leader{
    background:rgba(0,255,255,0.2);
    font-weight:700;
}

.results{
    margin-top:80px;
    background:rgba(0,0,40,0.8);
    padding:40px;
    border-radius:20px;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
}
</style>
</head>
<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Strona Główna</a></li>
        <li><a href="history.html">Historia</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<div class="section">
    <img src="assets/draft-logo.png">
    <h1>Draft 18</h1>

    <table id="rankingTable">
        <thead>
            <tr>
                <th>Gracz</th>
                <th>Bilans</th>
                <th>Punkty łączne</th>
                <th>Pkt za zwycięstwa</th>
                <th>Pkt za porażki</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="results" id="resultsBox">
        <h2>Wyniki</h2>
    </div>
</div>

<!-- NAJPIERW DANE -->
<script src="./draft18-data.js"></script>

<!-- POTEM SILNIK -->
<script>
const tableBody = document.querySelector("#rankingTable tbody");
const resultsBox = document.getElementById("resultsBox");

let stats = {};

players.forEach(p=>{
    stats[p] = {
        wins:0,
        losses:0,
        winPts:0,
        lossPts:0,
        total:0
    };
});

matches.forEach(m=>{
    const {p1,p2,pts1,pts2} = m;

    if(pts1 > pts2){
        stats[p1].wins++;
        stats[p2].losses++;
        stats[p1].winPts += pts1;
        stats[p2].lossPts += pts2;
    } else {
        stats[p2].wins++;
        stats[p1].losses++;
        stats[p2].winPts += pts2;
        stats[p1].lossPts += pts1;
    }

    stats[p1].total += pts1;
    stats[p2].total += pts2;

    const resultLine = document.createElement("p");
    resultLine.textContent = `${p1} ${pts1} – ${pts2} ${p2}`;
    resultsBox.appendChild(resultLine);
});

let ranking = Object.keys(stats).map(name=>({
    name,
    ...stats[name]
}));

ranking.sort((a,b)=>b.total - a.total);

ranking.forEach((player,i)=>{
    const row = document.createElement("tr");

    if(i===0 && player.total > 0){
        row.classList.add("leader");
    }

    row.innerHTML = `
        <td>${player.name}</td>
        <td>${player.wins}-${player.losses}</td>
        <td>${player.total}</td>
        <td>${player.winPts}</td>
        <td>${player.lossPts}</td>
    `;

    tableBody.appendChild(row);
});
</script>

</body>
</html>
