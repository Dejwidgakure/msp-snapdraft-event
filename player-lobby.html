<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaktyczna Baza Wojowników</title>

<script src="database.js"></script>

<style>

body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/cosmic-bg.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    backdrop-filter:blur(10px);
    background:rgba(5,10,25,0.75);
}

nav img{
    height:60px;
    filter:drop-shadow(0 0 15px #00f0ff);
}

nav ul{
    list-style:none;
    display:flex;
    gap:40px;
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* HEADER */
.header{
    text-align:center;
    margin-top:60px;
    font-size:48px;
    font-family:'Orbitron', sans-serif;
    text-shadow:
        0 0 20px #00f0ff,
        0 0 40px #8a2be2;
}

/* GRID */
.grid{
    max-width:1100px;
    margin:50px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:25px;
    padding:20px;
}

/* PLAYER CARD */
.player{
    padding:25px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 0 20px rgba(0,240,255,0.2);
    font-size:18px;
    font-weight:600;
}

.player:hover{
    transform:scale(1.05);
    box-shadow:0 0 40px #00f0ff;
}

</style>
</head>

<body>

<nav>
    <img src="assets/msp-logo.png">
    <ul>
        <li><a href="index.html">Strona Główna</a></li>
        <li><a href="draft.html">Drafty</a></li>
        <li><a href="hallOfFame.html">Sala Chwały</a></li>
    </ul>
</nav>

<div class="header">
    Galaktyczna Baza Wojowników
</div>

<div class="grid" id="playersGrid"></div>

<script>

// 🔥 BEZPIECZEŃSTWO
if(typeof database === "undefined"){
    document.body.innerHTML = "<h1 style='color:white;text-align:center'>BŁĄD: database.js się nie załadowało</h1>";
}

// 🔥 ZBIERANIE GRACZY
let playersSet = new Set();

database.drafts.forEach(d=>{
    d.players.forEach(p=>{
        playersSet.add(p.name);
    });
});

const players = Array.from(playersSet);

// 🔥 RENDER
const grid = document.getElementById("playersGrid");

players.forEach(name=>{
    const div = document.createElement("div");
    div.className = "player";
    div.innerText = name;

    div.onclick = () => {
        window.location.href = `player.html?name=${name}`;
    };

    grid.appendChild(div);
});

</script>

</body>
</html>
