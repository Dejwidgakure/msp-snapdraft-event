<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sala Chwały</title>

<script src="database.js"></script>
<script src="hallOfFame.js"></script>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial;
padding:20px;
}
h1{
text-align:center;
}
table{
border-collapse:collapse;
margin:auto;
margin-top:20px;
}
td,th{
border:1px solid #444;
padding:8px 14px;
text-align:center;
}
th{
background:#222;
}
.section{
margin-top:40px;
text-align:center;
}
</style>
</head>
<body>

<h1>🏆 SALA CHWAŁY</h1>

<div class="section">
<h2>Ranking All Time</h2>
<table id="rankingTable"></table>
</div>

<div class="section">
<h2>Rekordy</h2>
<div id="records"></div>
</div>

<script>

const hall = calculateHallOfFame(database);


/* ===== RANKING ===== */

document.getElementById("rankingTable").innerHTML=`

<tr>
<th>Gracz</th>
<th>Wygrane Drafty</th>
<th>Punkty</th>
<th>Średnia</th>
</tr>

`+

hall.ranking.map(p=>`

<tr>
<td>${p.name}</td>
<td>${p.draftWins}</td>
<td>${p.points}</td>
<td>${p.avg}</td>
</tr>

`).join("");



/* ===== REKORDY ===== */

document.getElementById("records").innerHTML=`

<h3>🔥 Najwięcej wygranych do 0</h3>
${hall.cleanRanking.map(p=>`${p.name} — ${p.val}`).join("<br>")}

<br><br>

<h3>⚔ Walczak (pkt z porażek)</h3>
${hall.fighterRanking.map(p=>`${p.name} — ${p.val}`).join("<br>")}

<br><br>

<h3>💥 Największe zwycięstwo</h3>
${hall.biggestWin.player} — różnica ${hall.biggestWin.diff}

`;

</script>

</body>
</html>
