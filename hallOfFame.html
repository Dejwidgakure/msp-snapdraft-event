<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sala Chwały - MSP Draft</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Rajdhani', sans-serif;
    background:url("assets/sala.png") no-repeat center center fixed;
    background-size:cover;
    color:white;
    position:relative;
}

/* LEKKIE PRZYCIEMNIENIE DLA CZYTELNOŚCI */

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(5,10,25,0.65);
    backdrop-filter:blur(3px);
    z-index:-1;
}

/* NAV */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    background:rgba(5,10,25,0.75);
    backdrop-filter:blur(10px);
}

nav a{
    text-decoration:none;
    color:white;
    font-weight:600;
}

/* MAIN */

.container{
    max-width:1200px;
    margin:auto;
    padding:60px 20px 100px 20px;
}

h1{
    text-align:center;
    font-family:'Orbitron', sans-serif;
    font-size:64px;
    margin-bottom:50px;
    text-shadow:
        0 0 20px #8a2be2,
        0 0 40px #00f0ff,
        0 0 80px #00f0ff;
}

h2{
    margin-top:70px;
    margin-bottom:30px;
    font-size:32px;
    border-bottom:2px solid rgba(255,255,255,0.2);
    padding-bottom:10px;
}

/* TABLE */

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:40px;
    background:rgba(255,255,255,0.05);
    border-radius:15px;
    overflow:hidden;
    backdrop-filter:blur(10px);
}

th, td{
    padding:14px;
    text-align:center;
}

th{
    background:rgba(138,43,226,0.35);
    font-weight:700;
}

tr:nth-child(even){
    background:rgba(255,255,255,0.06);
}

tr:hover{
    background:rgba(0,240,255,0.12);
    transition:0.3s;
}

/* REKORDY GRID */

.records{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
}

.record-box{
    background:rgba(255,255,255,0.07);
    padding:25px;
    border-radius:18px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(0,240,255,0.25);
    transition:0.3s;
}

.record-box:hover{
    transform:translateY(-5px);
    box-shadow:0 0 40px rgba(138,43,226,0.4);
}

.record-box h3{
    margin-bottom:12px;
    font-size:18px;
}

.record-box p{
    font-size:22px;
    font-weight:700;
}

</style>
</head>

<body>

<nav>
    <a href="index.html">Strona Główna</a>
    <a href="draft.html">Drafty</a>
</nav>

<div class="container">

    <h1>🏆 SALA CHWAŁY</h1>

    <h2>Ranking All Time</h2>
    <table id="rankingTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Gracz</th>
                <th>Wygrane Drafty</th>
                <th>Punkty</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>

    <h2>Rekordy</h2>
    <div class="records" id="recordsContainer">
    </div>

</div>

<script src="database.js"></script>
<script src="hallOfFame.js"></script>

</body>
</html>
